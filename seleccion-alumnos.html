function esNombreFemenino(nombre) {
  if (!nombre) return false;
  const primero = nombre.trim().toLowerCase().split(' ')[0];
  return NOMBRES_FEMENINOS.has(primero);
}

const MODALIDADES = ['soldador', 'tubero', 'montador', 'todos'];
const MODALIDADES_COLORES = {
  'soldador': '#f59e0b',
  'tubero': '#3b82f6',
  'montador': '#10b981',
  'todos': '#6366f1'
};

let state = {
  alumnos: [],
  seleccionados: [],
  reservas: [],
  modalidadSeleccionada: 'todos',
  numPrincipales: 15,
  numReservas: 5,
  pestana: 'seleccion',
  busqueda: '',
  paginaActual: 1,
  mostrarFiltros: false
};
const porPagina = 50;

function detectarFilaCabeceras(json) {
  for (let i = 0; i < Math.min(10, json.length); i++) {
    const row = json[i];
    if (!row) continue;
    for (let j = 0; j < row.length; j++) {
      const celda = String(row[j] || '').toLowerCase().trim();
      if (celda === 'nombre') return i;
    }
  }
  return 2;
}

function getModalidades(row) {
  if (!Array.isArray(row)) return [];
  const obs = String(row[4] || '').toLowerCase();
  const mods = [];
  if (obs.includes('soldador') || obs.includes('soldadura')) mods.push('soldador');
  if (obs.includes('tubero') || obs.includes('tuberia')) mods.push('tubero');
  if (obs.includes('montador')) mods.push('montador');
  return mods;
}

function leerExcel(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    try {
      const data = new Uint8Array(event.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      
      let mejorHoja = 0;
      let maxDatos = 0;
      
      for (let h = 0; h < workbook.SheetNames.length; h++) {
        const sheet = workbook.Sheets[workbook.SheetNames[h]];
        const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });
        let filasConDatos = 0;
        for (let i = 1; i < json.length; i++) {
          if (json[i] && json[i].length > 0 && json[i][2]) filasConDatos++;
        }
        if (filasConDatos > maxDatos) {
          maxDatos = filasConDatos;
          mejorHoja = h;
        }
      }
      
      const sheet = workbook.Sheets[workbook.SheetNames[mejorHoja]];
      const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });
      
      if (json.length < 2) {
        alert('Archivo vacío');
        return;
      }
      
      const filaCabeceras = detectarFilaCabeceras(json);
      
      const nuevosAlumnos = [];
      let saltados = 0;
      
      for (let i = filaCabeceras + 1; i < json.length; i++) {
        const row = json[i];
        if (!row || row.length === 0) { saltados++; continue; }
        
        const nombre = String(row[2] || '').trim();
        if (!nombre) { saltados++; continue; }
        
        let edad;
        const edadVal = parseInt(row[10]);
        if (!isNaN(edadVal)) edad = edadVal;
        
        const observaciones = String(row[4] || '').trim();
        const modalidades = getModalidades(row);
        
        nuevosAlumnos.push({
          id: 'alum-' + i,
          nombre,
          edad,
          estudios: observaciones,
          experiencias: '',
          modalidades: modalidades,
          modalidad: modalidades[0] || '',
          curso: modalidades.join(', '),
          seleccionado: false,
          esReserva: false,
          esEvitable: false
        });
      }
      
      state.alumnos = nuevosAlumnos;
      state.seleccionados = [];
      state.reservas = [];
      state.paginaActual = 1;
      
      const soldador = nuevosAlumnos.filter(a => a.modalidades && a.modalidades.includes('soldador')).length;
      const tubero = nuevosAlumnos.filter(a => a.modalidades && a.modalidades.includes('tubero')).length;
      const montador = nuevosAlumnos.filter(a => a.modalidades && a.modalidades.includes('montador')).length;
      
      alert('Hoja seleccionada: ' + workbook.SheetNames[mejorHoja] + '\n\nTotal: ' + nuevosAlumnos.length + ' alumnos\nMontador: ' + montador + '\nTubero: ' + tubero + '\nSoldador: ' + soldador);
      render();
    } catch (err) {
      console.error('Error:', err);
      alert('Error al leer Excel: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function getAlumnosFiltrados() {
  let result = [...state.alumnos];
  
  if (state.busqueda) {
    const lower = state.busqueda.toLowerCase();
    result = result.filter(a => 
      a.nombre.toLowerCase().includes(lower) ||
      (a.estudios && a.estudios.toLowerCase().includes(lower))
    );
  }
  
  if (state.modalidadSeleccionada !== 'todos') {
    const filtro = state.modalidadSeleccionada;
    result = result.filter(a => a.modalidades && a.modalidades.includes(filtro));
  }
  
  return result;
}

function seleccionarAleatorio() {
  const disponibles = getAlumnosFiltrados().filter(a => !a.seleccionado && !a.esEvitable);
  
  if (disponibles.length === 0) {
    alert('No hay candidatos disponibles');
    return;
  }
  
  const shuffled = [...disponibles].sort(() => Math.random() - 0.5);
  const principales = shuffled.slice(0, state.numPrincipales).map(a => ({ ...a, selecionado: true }));
  
  const noSeleccionados = disponibles.filter(a => !principales.find(p => p.id === a.id));
  const shuffledReservas = [...noSeleccionados].sort(() => Math.random() - 0.5);
  const reservasArr = shuffledReservas.slice(0, state.numReservas).map(a => ({ ...a, esReserva: true }));
  
  state.seleccionados = principales;
  state.reservas = reservasArr;
  state.alumnos = state.alumnos.map(a => {
    const isPrincipal = principales.find(p => p.id === a.id);
    const isReserva = reservasArr.find(r => r.id === a.id);
    if (isPrincipal) return { ...a, seleccionado: true, esReserva: false };
    if (isReserva) return { ...a, seleccionado: false, esReserva: true };
    return { ...a, seleccionado: false, esReserva: false };
  });
  
  console.log('Seleccionados:', principales.length, 'Reservas:', reservasArr.length);
  render();
}

function ascenderReserva(reserva) {
  const nuevosSeleccionados = [...state.seleccionados];
  const ultimo = nuevosSeleccionados.pop();
  if (ultimo) {
    state.reservas = [...state.reservas, { ...ultimo, seleccionado: false, esReserva: true }];
  }
  nuevosSeleccionados.push({ ...reserva, seleccionado: true, esReserva: false });
  state.seleccionados = nuevosSeleccionados;
  state.reservas = state.reservas.filter(r => r.id !== reserva.id);
  render();
}

function toggleEvitable(alumnoId) {
  state.alumnos = state.alumnos.map(a => a.id === alumnoid ? { ...a, esEvitable: !a.esEvitable } : a);
  render();
}

function eliminarAlumno(alumnoId) {
  state.alumnos = state.alumnos.filter(a => a.id !== alumnoid);
  state.seleccionados = state.seleccionados.filter(a => a.id !== alumnoid);
  state.reservas = state.reservas.filter(a => a.id !== alumnoid);
  render();
}

function actualizarCampo(alumnoId, campo, valor) {
  const actualizar = lista => lista.map(a => a.id === alumnoid ? { ...a, [campo]: valor } : a);
  state.alumnos = actualizar(state.alumnos);
  state.seleccionados = actualizar(state.seleccionados);
  state.reservas = actualizar(state.reservas);
  render();
}

function asignarCurso() {
  const nombreMostrar = state.modalidadSeleccionada.charAt(0).toUpperCase() + state.modalidadSeleccionada.slice(1);
  const actualizar = lista => lista.map(a => ({ ...a, curso: nombreMostrar }));
  state.alumnos = actualizar(state.alumnos);
  state.seleccionados = actualizar(state.seleccionados);
  state.reservas = actualizar(state.reservas);
  render();
}

function copiarNombres() {
  let texto = 'ALUMNOS SELECCIONADOS:\n';
  state.seleccionados.forEach((a, i) => {
    const indicadores = [];
    if (esNombreFemenino(a.nombre)) indicadores.push('M');
    if (a.edad) indicadores.push(a.edad + ' años');
    if (a.curso) indicadores.push(a.curso);
    texto += (i + 1) + '. ' + a.nombre + (indicadores.length ? ' (' + indicadores.join(', ') + ')' : '') + '\n';
  });
  if (state.reservas.length > 0) {
    texto += '\nRESERVAS:\n';
    state.reservas.forEach((a, i) => {
      const indicadores = [];
      if (esNombreFemenino(a.nombre)) indicadores.push('M');
      if (a.edad) indicadores.push(a.edad + ' años');
      texto += (i + 1) + '. ' + a.nombre + (indicadores.length ? ' (' + indicadores.join(', ') + ')' : '') + '\n';
    });
  }
  navigator.clipboard.writeText(texto);
}

function exportarCSV() {
  let csv = 'Tipo,N°,Nombre,Edad,Estudios,Modalidad,Curso\n';
  state.seleccionados.forEach((a, i) => {
    csv += `Alumno,${i + 1},"${a.nombre}",${a.edad || ''},"${a.estudios || ''}","${a.modalidades ? a.modalidades.join(', ') : ''}","${a.curso || ''}"\n`;
  });
  state.reservas.forEach((a, i) => {
    csv += `Reserva,${i + 1},"${a.nombre}",${a.edad || ''},"${a.estudios || ''}","${a.modalidades ? a.modalidades.join(', ') : ''}","${a.curso || ''}"\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'seleccion_alumnos.csv';
  a.click();
}

function getAlumnosPaginados() {
  const filtrados = getAlumnosFiltrados();
  const inicio = (state.paginaActual - 1) * porPagina;
  return filtrados.slice(inicio, inicio + porPagina);
}

function getPaginasTotales() {
  return Math.ceil(getAlumnosFiltrados().length / porPagina);
}

function renderTarjeta(alumno, esReserva, esBaseDatos) {
  return `
    <div class="${esReserva ? 'bg-gray-50 border-gray-300 opacity-70' : 'bg-white border-gray-200'} ${alumno.esEvitable ? 'ring-2 ring-red-500' : ''} p-3 rounded-lg border">
      <div class="flex justify-between items-start mb-2">
        <input type="text" value="${alumno.nombre.replace(/"/g, '&quot;')}" 
          onchange="actualizarCampo('${alumno.id}', 'nombre', this.value)"
          class="font-medium bg-transparent border-none focus:outline-none focus:ring-1 focus:ring-blue-300 rounded px-1 flex-1" />
        <div class="flex gap-1 ml-2">
          ${esBaseDatos ? `<button onclick="toggleEvitable('${alumno.id}')" class="p-1 rounded ${alumno.esEvitable ? 'bg-red-100 text-red-600' : 'bg-gray-100 text-gray-400'}">X</button>` : ''}
          <button onclick="eliminarAlumno('${alumno.id}')" class="p-1 rounded bg-red-50 text-red-500 hover:bg-red-100">X</button>
        </div>
      </div>
      <div class="text-xs space-y-1">
        ${alumno.edad !== undefined ? `<span class="bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded text-xs">${alumno.edad} años</span>` : ''}
        ${esNombreFemenino(alumno.nombre) ? '<span class="text-purple-600 font-medium">M</span>' : ''}
        ${alumno.modalidades && alumno.modalidades.length > 0 ? `<span class="bg-yellow-100 text-yellow-700 px-1.5 py-0.5 rounded text-xs">${alumno.modalidades.join(', ')}</span>` : ''}
        <div class="text-xs text-gray-600 bg-gray-50 rounded px-2 py-1 break-words" style="min-height: 50px;">${(alumno.estudios || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
        ${esBaseDatos ? `
          <input type="text" value="${(alumno.estudios || '').replace(/"/g, '&quot;')}" 
            onchange="actualizarCampo('${alumno.id}', 'estudios', this.value)"
            placeholder="Editar observaciones..." 
            class="w-full bg-white border border-gray-200 rounded px-2 py-1 text-xs mt-1" />
        ` : ''}
          <div class="flex items-center gap-1">
            <select onchange="actualizarCampo('${alumno.id}', 'curso', this.value)"
              class="bg-gray-50 border border-gray-200 rounded px-2 py-1 text-xs flex-1">
              <option value="" ${!alumno.curso ? 'selected' : ''}>Sin curso</option>
              <option value="Soldador" ${alumno.curso === 'Soldador' ? 'selected' : ''}>Soldador</option>
              <option value="Tubero" ${alumno.curso === 'Tubero' ? 'selected' : ''}>Tubero</option>
              <option value="Montador" ${alumno.curso === 'Montador' ? 'selected' : ''}>Montador</option>
            </select>
            ${alumno.seleccionado ? '<span class="bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded text-xs">ALUMNO</span>' : ''}
            ${alumno.esReserva ? '<span class="bg-gray-200 text-gray-600 px-1.5 py-0.5 rounded text-xs">RESERVA</span>' : ''}
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

  const colorModalidad = MODALIDADES_COLORES[state.modalidadSeleccionada] || MODALIDADES_COLORES['todos'];

        <button onclick="state.pestana='seleccion'; render()" class="px-4 py-2 rounded-lg ${state.pestana === 'seleccion' ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 border'}">Seleccion</button>
        <button onclick="state.pestana='basedatos'; render()" class="px-4 py-2 rounded-lg ${state.pestana === 'basedatos' ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 border'}">Base de Datos</button>

            Subir Excel
            <input type="file" accept=".xlsx,.xls,.csv" onchange="leerExcel(event)" class="hidden" />

        </div>
      `;
    } else {
      app += `

              <label class="text-xs text-gray-500 block mb-1">Modalidad</label>

                ${MODALIDADES.map(m => `<option value="${m}" ${state.modalidadSeleccionada === m ? 'selected' : ''}>${m.charAt(0).toUpperCase() + m.slice(1)}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="text-xs text-gray-500 block mb-1">Alumnos</label>
              <input type="number" value="${state.numPrincipales}" onchange="state.numPrincipales=Number(this.value); render()" class="border rounded-lg px-3 py-2 w-20" min="1" />

              </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 mb-6">
              ${state.seleccionados.map((alumno, idx) => `
                <div class="relative">
                  <span class="absolute -top-2 -left-2 bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">${idx + 1}</span>
                  ${renderTarjeta(alumno, false, false)}
                </div>
              `).join('')}
            </div>
            ${state.reservas.length > 0 ? `
              <h3 class="text-md font-semibold text-gray-500 mb-3">Reservas (${state.reservas.length})</h3>
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                ${state.reservas.map((alumno, idx) => `
                  <div class="relative">
                    <span class="absolute -top-2 -left-2 bg-gray-400 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">${idx + 1}</span>
                    <button onclick="ascenderReserva('${alumno.id}')" class="absolute top-2 right-2 p-1 bg-green-100 text-green-600 rounded">↑</button>
                    ${renderTarjeta(alumno, true, false)}
                  </div>
                `).join('')}
              </div>
            ` : ''}
          </div>
        `;
      }
    }
  }

  if (state.pestana === 'basedatos') {
    app += `
      <div class="bg-white rounded-xl p-4 border mb-4">
        <input type="text" placeholder="Buscar alumno..." value="${state.busqueda.replace(/"/g, '&quot;')}" oninput="state.busqueda=this.value; state.paginaActual=1; render()" class="w-full border rounded-lg px-4 py-2" />
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
        ${getAlumnosPaginados().map(alumno => renderTarjeta(alumno, false, true)).join('')}
      </div>
      ${getPaginasTotales() > 1 ? `
        <div class="flex justify-center items-center gap-4 mt-4">
          <button onclick="state.paginaActual=Math.max(1, state.paginaActual-1); render()" class="px-4 py-2 bg-white border rounded-lg">←</button>
          <span class="text-sm">Pagina ${state.paginaActual} de ${getPaginasTotales()}</span>
          <button onclick="state.paginaActual=Math.min(${getPaginasTotales()}, state.paginaActual+1); render()" class="px-4 py-2 bg-white border rounded-lg">→</button>
        </div>
      ` : ''}
    `;
  }

  document.getElementById('app').innerHTML = app;
}

render();
</script>
</body>
</html>
